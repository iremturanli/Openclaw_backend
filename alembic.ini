# Alembic configuration for the StayWallet backend.
#
# The database URL is NOT stored here — it is read at runtime from application
# settings (STAYWALLET_DATABASE_URL_SYNC, i.e. the psycopg2 sync URL) in
# alembic/env.py, so no secrets live in committed config.
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Timezone-aware, sortable migration filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
